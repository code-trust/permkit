version: "3"

vars:
  RUSTFMT_CONFIG: group_imports=StdExternalCrate,imports_granularity=Module,imports_layout=Vertical

tasks:
  default:
    desc: Run tests
    cmds:
      - task: test

  test:
    desc: Run tests
    cmds:
      - cargo test --workspace

  format:
    deps:
      - task: format:cargo
      - task: format:nix
      - task: format:taplo

  format:cargo:
    cmds:
      - cargo fmt -- --config {{.RUSTFMT_CONFIG}}

  format:nix:
    cmds:
      - nixfmt flake.nix

  format:taplo:
    env:
      RUST_LOG: warn
    cmds:
      - taplo format

  lint:
    deps:
      - task: lint:clippy
      - task: lint:cargo
      - task: lint:nix
      - task: lint:taplo

  lint:cargo:
    cmds:
      - cargo fmt --check -- --config {{.RUSTFMT_CONFIG}}

  lint:clippy:
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -Dwarnings

  lint:nix:
    cmds:
      - nixfmt --check flake.nix

  lint:taplo:
    env:
      RUST_LOG: warn
    cmds:
      - taplo format --check --diff
